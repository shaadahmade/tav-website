<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Advertising Villa | Digital Marketing Agency</title>
    <meta name="description" content="A Digital Marketing Agency That Makes Websites, SEO & Ads Easy to Understand" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Space+Grotesk:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <style>
      /* Initial-paint splash - visible before React boots, removed on mount */
      html, body { margin: 0; background: #09090b; }
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #09090b;
        transition: opacity 400ms ease-out;
      }
      #initial-loader img {
        width: clamp(96px, 18vw, 180px);
        height: auto;
        animation: loader-fade 1.2s ease-in-out infinite alternate;
      }
      #initial-loader.loaded {
        opacity: 0;
        pointer-events: none;
      }
      @keyframes loader-fade {
        from { opacity: 0.55; transform: scale(0.98); }
        to   { opacity: 1.00; transform: scale(1.00); }
      }
      @media (prefers-reduced-motion: reduce) {
        #initial-loader img { animation: none; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="initial-loader" aria-hidden="true">
      <img src="/logo.png" alt="" />
    </div>
    <div id="root"></div>
    <div class="noise-overlay"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
